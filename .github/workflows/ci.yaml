---
name: CI

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  required-checks:
    name: CI - Required Checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Require checks in PR
        uses: devantler-tech/actions/aggregate-job-checks@172feec0374dfdb5d9777a12a7d4cd2291c03e08 # v7.1.1
        with:
          job-results: ""
