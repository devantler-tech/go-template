---
name: CI

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  required-checks:
    name: CI - Required Checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Require checks in PR
        uses: devantler-tech/actions/aggregate-job-checks@6a2f24aa5a859f7d0de66f9d0bde52254adba641 # v7.1.3
        with:
          job-results: ""
